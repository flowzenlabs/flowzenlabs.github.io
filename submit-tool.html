<!DOCTYPE html>
<html>

<head>

<title>Submit AI Tool | FlowZenLabs</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Submit an AI Tool</h1>

<p>
Help grow FlowZenLabs by submitting useful AI tools.
</p>

<form>

<label>Tool Name</label>
<br>
<input type="text" placeholder="Example: ChatGPT">

<br><br>

<label>Website URL</label>
<br>
<input type="url" placeholder="https://">

<br><br>

<label>Category</label>
<br>

<select>

<option>Writing</option>
<option>Image</option>
<option>Video</option>
<option>Productivity</option>

</select>

<br><br>

<label>Description</label>
<br>

<textarea rows="4"
placeholder="Short description of the AI tool"></textarea>

<br><br>

<button type="submit">

Submit Tool

</button>

</form>

<br><br>

<a href="index.html">← Back to Directory</a>

</div>

</body>

</html>
